name: Trivy Container Scan

on:
  # Triggers immediately after your build pipeline finishes
  workflow_run:
    workflows: ["Build and Deploy Docker Image"]
    types:
      - completed

jobs:
  trivy-scan:
    # Only run if the image successfully built and pushed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    # REQUIRED: So the job can access your DockerHub secrets
    environment: production

    steps:
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull freshly built Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/seatunnel-orchestrator:${{ github.event.workflow_run.head_sha }}

      # ==========================================
      # RUN 1: Generate the Downloadable HTML Report
      # ==========================================
      - name: Run Trivy Scanner (HTML Format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/seatunnel-orchestrator:${{ github.event.workflow_run.head_sha }}'
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'trivy-report.html'
          scanners: 'vuln,misconfig,secret,license'
          exit-code: '0'
        env:
          TRIVY_IMAGE_CONFIG_SCANNERS: 'misconfig,secret'

      - name: Upload Trivy HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Trivy_Security_Report
          path: trivy-report.html

      # ==========================================
      # RUN 2: Generate the SARIF file for GitHub UI
      # ==========================================
      - name: Run Trivy Scanner (SARIF Format)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKERHUB_USERNAME }}/seatunnel-orchestrator:${{ github.event.workflow_run.head_sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          scanners: 'vuln,misconfig,secret,license'
          exit-code: '0'
        env:
          TRIVY_IMAGE_CONFIG_SCANNERS: 'misconfig,secret'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'