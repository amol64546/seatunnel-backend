name: ZAP Security Scan

on:
  # This triggers the scan immediately after the Build pipeline finishes
  workflow_run:
    workflows: ["Build and Deploy Docker Image"]
    types:
      - completed

jobs:
  security-scan:
    # This ensures we only run ZAP if the image successfully built and pushed
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: production

    # Required permissions to allow ZAP to open GitHub Issues
    permissions:
      issues: write
      contents: read

    steps:
      - name: Log in to DockerHub (To avoid rate limits or pull private images)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull freshly built Docker image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/seatunnel-orchestrator:${{ github.event.workflow_run.head_sha }}

      - name: Start container locally for ZAP scan
        run: docker run -d -p 8080:8080 --name orchestrator-app ${{ secrets.DOCKERHUB_USERNAME }}/seatunnel-orchestrator:${{ github.event.workflow_run.head_sha }}

      - name: Wait for application to boot
        run: sleep 20

      - name: Run ZAP API Scan
        uses: zaproxy/action-api-scan@v0.10.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          format: openapi

          # CRITICAL: This must point to the actual JSON/YAML Swagger definition
          # Adjust this path if your app exposes it somewhere else (e.g. /swagger-ui/api-docs)
          target: 'http://localhost:8080/v3/api-docs'

          # Fails the pipeline if vulnerabilities are found
          fail_action: true

          # '-a' tells ZAP to perform an ACTIVE scan (injecting payloads) rather than just passive listening
          cmd_options: '-a'